name: Non-Standard Hosts Curl

on:
  workflow_dispatch:

jobs:
  curl-non-standard-hosts:
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
        #  api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY_NSH}}
      # ============= InvisiRisk Setup End =============      
      - name: Curl Non-Standard Hosts
        run: |
          set +e
          curl -s --max-time 5 -o /dev/null https://test.pypi.org || true
          curl -s --max-time 5 -o /dev/null https://test-files.pythonhosted.org || true
          curl -s --max-time 5 -o /dev/null https://api.veribom.com || true
          curl -s --max-time 5 -o /dev/null https://vbirmock.free.beeceptor.com || true
          curl -s --max-time 5 -o /dev/null https://package-registry.free.beeceptor.com || true
          curl -s --max-time 5 -o /dev/null https://httpbin.org || true
          curl -s --max-time 5 -o /dev/null https://httpbin.io || true
          curl -s --max-time 5 -o /dev/null https://internal-registry.company.local || true
          curl -s --max-time 5 -o /dev/null https://my-private-pypi.internal || true
          curl -s --max-time 5 -o /dev/null https://artifactory.internal.corp || true
          curl -s --max-time 5 -o /dev/null https://nexus.internal.corp || true
          curl -s --max-time 5 -o /dev/null https://private-npm.mycompany.com || true
          curl -s --max-time 5 -o /dev/null https://custom-maven.myorg.net || true
          curl -s --max-time 5 -o /dev/null https://mirror.custom-registry.io || true
          curl -s --max-time 5 -o /dev/null https://packages.internal.dev || true
          curl -s --max-time 5 -o /dev/null https://staging-pypi.example.com || true
          curl -s --max-time 5 -o /dev/null https://dev-registry.example.org || true
          curl -s --max-time 5 -o /dev/null https://custom-pip-mirror.io || true          
          curl -s --max-time 5 -o /dev/null https://pypi-mirror.ru || true
          curl -s --max-time 5 -o /dev/null https://npm-unofficial.net || true
          curl -s --max-time 5 -o /dev/null https://maven-unofficial.org || true
          # --- typosquatting / lookalike domains ---
          curl -s --max-time 5 -o /dev/null https://pypl.org || true
          curl -s --max-time 5 -o /dev/null https://githubb.com || true
          curl -s --max-time 5 -o /dev/null https://npmjs.com.packages.io || true
          curl -s --max-time 5 -o /dev/null https://registry.npmjs.org.cdn-deliver.net || true
          curl -s --max-time 5 -o /dev/null https://pypi.org.mirror-fast.com || true
          curl -s --max-time 5 -o /dev/null https://rubygems.org.mirror.io || true
          curl -s --max-time 5 -o /dev/null https://maven.apache.org.repo-cache.net || true
          curl -s --max-time 5 -o /dev/null https://github.com.cdn-assets.net || true
          # --- suspicious / exfil-looking domains ---
          curl -s --max-time 5 -o /dev/null https://data-collect.telemetry-hub.io || true
          curl -s --max-time 5 -o /dev/null https://log-upload.analytics-pipe.com || true
          curl -s --max-time 5 -o /dev/null https://metrics.build-tracker.xyz || true
          curl -s --max-time 5 -o /dev/null https://events.devtelemetry.net || true
          curl -s --max-time 5 -o /dev/null https://upload.crash-report.io || true
          curl -s --max-time 5 -o /dev/null https://beacon.ci-stats.dev || true
          curl -s --max-time 5 -o /dev/null https://exfil.notmalware.xyz || true
          curl -s --max-time 5 -o /dev/null https://c2.totally-legit-updates.com || true
          # --- geo-specific / unusual TLD mirrors ---
          curl -s --max-time 5 -o /dev/null https://pypi-cn.mirror.net.cn || true
          curl -s --max-time 5 -o /dev/null https://npm.taobao.org || true
          curl -s --max-time 5 -o /dev/null https://mirrors.aliyun.com || true
          curl -s --max-time 5 -o /dev/null https://repo.huaweicloud.com || true
          curl -s --max-time 5 -o /dev/null https://pypi.doubanio.com || true
          curl -s --max-time 5 -o /dev/null https://npm.elemecdn.com || true
          # --- credential/token harvest lookalikes ---
          curl -s --max-time 5 -o /dev/null https://auth.login-portal.io || true
          curl -s --max-time 5 -o /dev/null https://sso.internal-auth.company.net || true
          curl -s --max-time 5 -o /dev/null https://token-refresh.devops-pipeline.com || true
          curl -s --max-time 5 -o /dev/null https://oauth.build-service.internal || true
          # --- random/DGA-looking domains ---
          curl -s --max-time 5 -o /dev/null https://xf3k2p.packages.delivery || true
          curl -s --max-time 5 -o /dev/null https://a7bcq91.cdn-static.net || true
          curl -s --max-time 5 -o /dev/null https://pkg-dl.z9m2x.workers.dev || true
          curl -s --max-time 5 -o /dev/null https://d1kzrt.cloudfront-cdn.io || true
          # --- private/internal-looking registries ---
          curl -s --max-time 5 -o /dev/null https://docker.internal.mycompany.io || true
          curl -s --max-time 5 -o /dev/null https://registry.prod.internal.corp || true
          curl -s --max-time 5 -o /dev/null https://helm.charts.internal.dev || true
          curl -s --max-time 5 -o /dev/null https://pip.internal.eng.corp || true
          curl -s --max-time 5 -o /dev/null https://gems.internal.ruby.corp || true
          curl -s --max-time 5 -o /dev/null https://nuget.internal.dotnet.local || true
          # --- supply chain attack lookalikes ---
          curl -s --max-time 5 -o /dev/null https://node-packages.supply-cdn.com || true
          curl -s --max-time 5 -o /dev/null https://pip-packages.fast-mirror.dev || true
          curl -s --max-time 5 -o /dev/null https://maven-central.cache-proxy.net || true
          curl -s --max-time 5 -o /dev/null https://gradle-plugins.build-cache.io || true
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
