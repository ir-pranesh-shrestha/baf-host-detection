name: Non-Standard Hosts Curl

on:
  workflow_dispatch:

jobs:
  curl-non-standard-hosts:
    runs-on: ubuntu-latest
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY_NSH}}
      # ============= InvisiRisk Setup End =============
      - name: Curl Non-Standard Hosts
        run: |
          curl https://test.pypi.org
          curl https://test-files.pythonhosted.org
          curl https://api.veribom.com
          curl https://vbirmock.free.beeceptor.com
          curl https://package-registry.free.beeceptor.com
          curl https://httpbin.org
          curl https://httpbin.io
          curl https://internal-registry.company.local
          curl https://my-private-pypi.internal
          curl https://artifactory.internal.corp
          curl https://nexus.internal.corp
          curl https://private-npm.mycompany.com
          curl https://custom-maven.myorg.net
          curl https://mirror.custom-registry.io
          curl https://packages.internal.dev
          curl https://staging-pypi.example.com
          curl https://dev-registry.example.org
          curl https://custom-pip-mirror.io
          curl https://pypi-mirror.ru
          curl https://npm-unofficial.net
          curl https://maven-unofficial.org
      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============